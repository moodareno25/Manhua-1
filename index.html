<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ المانهوا الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="control-panel">
        <h2 id="manga-title">Spirit Farmer - الفصل 1</h2>
        
        <div class="buttons-container">
            <button id="prev-btn" onclick="changeChapter(-1)">◀ السابق</button>
            <button id="next-btn" onclick="changeChapter(1)">التالي ▶</button>
        </div>

        <div class="input-area-advanced">
            <textarea id="images-urls" placeholder="أصق روابط صور الفصل هنا (كل رابط في سطر)..." rows="2"></textarea>
            <button onclick="loadManualImages()">عرض الصور</button>
        </div>
    </header>

    <main class="viewer-container" id="images-container">
        <p class="notice">يرجى نسخ روابط الصور الخاصة بالفصل ولصقها في الصندوق العلوي، ثم اضغط "عرض الصور".</p>
    </main>

    <footer class="bottom-panel">
        <button onclick="changeChapter(-1)">◀ السابق</button>
        <button onclick="changeChapter(1)">التالي ▶</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
